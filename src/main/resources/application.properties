# =============================================
# Plastic Waste Audit & Reduction Tracker
# Application Configuration
# =============================================

# Server
server.port=${PORT:8080}
server.servlet.context-path=/

# Database — auto-detects Railway PostgreSQL vs local MySQL
# Railway injects: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
# Local dev uses MySQL fallback
spring.datasource.url=jdbc:${DB_TYPE:mysql}://${PGHOST:localhost}:${PGPORT:3306}/${PGDATABASE:plastic_waste_db}?${DB_PARAMS:createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${PGUSER:root}
spring.datasource.password=${PGPASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.open-in-view=false

# SQL Init — disabled on Railway (JPA ddl-auto handles schema)
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.continue-on-error=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Error Handling — enable NoHandlerFoundException for proper 404 pages
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Logging
logging.level.com.plasticaudit=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/plastic-waste-tracker.log

# Async Thread Pool (Multithreading - CO1)
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=ReportAggregator-

# Alert Socket Server Port (CO4)
alert.socket.port=9090
alert.socket.enabled=true

# Application Name
spring.application.name=plastic-waste-tracker
