# =============================================
# Plastic Waste Audit & Reduction Tracker
# Application Configuration
# =============================================

# Server
server.port=${PORT:8080}
server.servlet.context-path=/

# MySQL Database Configuration
# Railway injects MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD automatically
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:plastic_waste_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate 6.x (CO3)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Initialize Schema
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Error Handling — enable NoHandlerFoundException for proper 404 pages
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Logging
logging.level.com.plasticaudit=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/plastic-waste-tracker.log

# Async Thread Pool (Multithreading - CO1)
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=ReportAggregator-

# Alert Socket Server Port (CO4)
alert.socket.port=9090
alert.socket.enabled=true

# Application Name
spring.application.name=plastic-waste-tracker
